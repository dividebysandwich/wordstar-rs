<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WordStar-rs</title>
    <!-- `data-wasm-opt-params="-all"` lets wasm-opt accept the wasm features
         modern rustc emits by default (bulk-memory, non-trapping float-to-int,
         sign-ext, …); without it the release optimization fails to validate. -->
    <link
      data-trunk
      rel="rust"
      data-target-name="wordstar_rs"
      data-type="main"
      data-wasm-opt="z"
      data-wasm-opt-params="-all"
    />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0000aa;
        overflow: hidden;
      }
      /* Ratzilla's DomBackend renders each terminal row as a <pre>. Browsers
         give <pre> a default `margin: 1em 0`, which inserts a blank gap between
         every row (and makes the actual row height exceed the measured cell
         height). Zero it so rows are flush, matching the cell-size probe. */
      #grid,
      #grid pre {
        margin: 0;
        padding: 0;
        border: 0;
        line-height: normal;
      }
    </style>
  </head>
  <body></body>
</html>
