name: Release

# Build release artifacts on every version tag (e.g. `v1.2.3`), and on manual
# dispatch for testing. Tagged runs additionally publish a GitHub Release with
# every artifact attached.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: wordstar-rs

jobs:
  # ---------------------------------------------------------------------------
  # Cross-platform .zip archives (Windows, Linux, macOS)
  # ---------------------------------------------------------------------------
  archive:
    name: Archive (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: linux-x86_64
          # Both macOS targets build on the Apple Silicon runner: aarch64 is
          # native and x86_64 cross-compiles there with Apple's toolchain
          # (GitHub no longer offers Intel macOS runners).
          - os: macos-14
            target: aarch64-apple-darwin
            name: macos-aarch64
          - os: macos-14
            target: x86_64-apple-darwin
            name: macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package zip
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          stage="${BIN_NAME}-${version}-${{ matrix.name }}"
          mkdir "$stage"
          bin="target/${{ matrix.target }}/release/${BIN_NAME}"
          if [ "${{ runner.os }}" = "Windows" ]; then
            bin="${bin}.exe"
          fi
          cp "$bin" "$stage/"
          cp README.md "$stage/" || true
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a "${stage}.zip" "$stage" > /dev/null
          else
            zip -r "${stage}.zip" "$stage" > /dev/null
          fi
          echo "ASSET=${stage}.zip" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ env.ASSET }}
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Windows MSI installer (cargo-wix / WiX Toolset)
  # ---------------------------------------------------------------------------
  msi:
    name: Windows MSI
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-wix
        run: cargo install cargo-wix --locked

      - name: Generate WiX sources
        run: cargo wix init --force

      - name: Build MSI
        run: cargo wix --nocapture

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: target/wix/*.msi
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Debian packages: x86_64, Raspberry Pi 64-bit (aarch64) and 32-bit (armv7)
  # ---------------------------------------------------------------------------
  deb:
    name: Debian (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            apt: ""
          - target: aarch64-unknown-linux-gnu # Raspberry Pi 3/4/5 (64-bit)
            apt: gcc-aarch64-linux-gnu
          - target: armv7-unknown-linux-gnueabihf # Raspberry Pi 2/3 (32-bit)
            apt: gcc-arm-linux-gnueabihf
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross toolchain
        if: matrix.apt != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt }}

      - name: Install cargo-deb
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deb

      # The binary is stripped at compile time (profile.release.strip = true),
      # so cargo-deb does not need a target-specific `strip`.
      - name: Build .deb
        run: cargo deb --no-strip --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.target }}
          path: target/${{ matrix.target }}/debian/*.deb
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # WebAssembly bundle (Ratzilla + Trunk): downloadable .zip + GitHub Pages
  # ---------------------------------------------------------------------------
  web:
    name: Web (WASM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (wasm target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install Trunk
        uses: taiki-e/install-action@v2
        with:
          tool: trunk

      # `--public-url ./` keeps every asset reference relative, so the same
      # bundle works both unzipped on any static host and under the GitHub Pages
      # project subpath (https://<user>.github.io/<repo>/). Trunk downloads the
      # matching wasm-bindgen and wasm-opt automatically.
      - name: Build site
        run: trunk build --release --locked --public-url ./

      - name: Package zip
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          stage="${BIN_NAME}-${version}-web"
          cp -r dist "$stage"
          zip -r "${stage}.zip" "$stage" > /dev/null
          echo "ASSET=${stage}.zip" >> "$GITHUB_ENV"

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: web
          path: ${{ env.ASSET }}
          if-no-files-found: error

      # Separate artifact consumed by the deploy-pages job below.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # ---------------------------------------------------------------------------
  # Publish: gather every artifact and attach it to the GitHub Release
  # ---------------------------------------------------------------------------
  release:
    name: Publish release
    needs: [archive, msi, deb, web]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      # The Pages bundle is deployed by `deploy-pages`, not attached as a
      # release download (it is a tarball in GitHub's Pages format).
      - name: Drop the Pages artifact
        run: rm -rf dist/github-pages

      - name: List artifacts
        run: find dist -type f | sort

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
          fail_on_unmatched_files: true

  # ---------------------------------------------------------------------------
  # Deploy the WASM bundle to GitHub Pages (on tags; or manual dispatch to test)
  # ---------------------------------------------------------------------------
  deploy-pages:
    name: Deploy to GitHub Pages
    needs: web
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
