# Cross-compilation linkers for the Raspberry Pi / ARM Debian packages.
#
# These take effect only when building for the matching target triple, so they
# are harmless for normal native builds. The CI release workflow installs the
# corresponding GNU toolchains (gcc-aarch64-linux-gnu, gcc-arm-linux-gnueabihf).

[target.aarch64-unknown-linux-gnu]
linker = "aarch64-linux-gnu-gcc"

[target.armv7-unknown-linux-gnueabihf]
linker = "arm-linux-gnueabihf-gcc"
